name: Build iOS Lua XCFramework

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-xcframework:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build lua_public aggregate target
        run: |
          xcodebuild \
            -project LuaFramework.xcodeproj \
            -scheme lua_public \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            build

      - name: Validate generated XCFramework
        run: |
          test -d "Products/LuaFramework.xcframework"
          /usr/libexec/PlistBuddy -c "Print :CFBundlePackageType" Products/LuaFramework.xcframework/Info.plist

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuaFramework-xcframework
          path: Products/LuaFramework.xcframework
          if-no-files-found: error
